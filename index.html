<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VV Projectboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#00513A;--green-dark:#003D2B;
    --gold:#C9A227;--gold-soft:#E7D2A0;
    --ink:#1A1A1A;--paper:#F8F5EE;
    --white:#FFFFFF;
    --border:#DDD9CE;--text-muted:#6B7260;
    --radius:16px;--radius-sm:10px;
    --shadow:0 1px 4px rgba(0,81,58,0.07),0 1px 2px rgba(0,81,58,0.04);
    --shadow-md:0 4px 16px rgba(0,81,58,0.10),0 2px 6px rgba(0,81,58,0.06);
    --red:#C0392B;--red-light:#FDECEA;
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
  h1,h2,h3,.tab,.btn-primary,.btn-add-doel,.btn-add-taak,.btn-save{font-family:'Poppins',sans-serif}

  /* AUTH */
  #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;background:var(--paper)}
  .auth-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow-md);padding:2.75rem;width:100%;max-width:420px;border:1px solid var(--border)}
  .auth-logo{text-align:center;margin-bottom:2rem}
  .auth-logo .vv-logo{width:200px;margin:0 auto;display:block}
  .auth-logo p{font-size:13px;color:var(--text-muted);margin-top:12px;font-family:'Inter',sans-serif}
  .auth-divider{width:40px;height:2px;background:var(--gold);border-radius:2px;margin:.75rem auto 0}
  .form-group{margin-bottom:1rem}
  .form-group label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px;font-family:'Poppins',sans-serif}
  .form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:var(--white);transition:border-color .15s;font-family:'Inter',sans-serif}
  .form-group input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,81,58,0.08)}
  .btn-primary{width:100%;padding:12px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.02em}
  .btn-primary:hover{background:var(--green-dark)}
  .btn-primary:disabled{background:#7FA899;cursor:not-allowed}
  .auth-error{background:var(--red-light);color:var(--red);border:1px solid #F5C6C0;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none}

  /* APP */
  #app-screen{display:none;min-height:100vh}
  .topbar{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 2rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar-left .vv-logo{height:40px;width:auto;display:block}
  .topbar-divider{width:1.5px;height:24px;background:var(--border);margin:0 4px}
  .topbar-subtitle{font-size:13px;font-weight:500;color:var(--text-muted);font-family:'Poppins',sans-serif;letter-spacing:.01em}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .user-badge{font-size:12px;color:var(--text-muted);background:var(--paper);padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-family:'Inter',sans-serif}
  .btn-logout{font-size:13px;color:var(--text-muted);background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 14px;cursor:pointer;transition:all .15s;font-family:'Poppins',sans-serif;font-weight:500}
  .btn-logout:hover{background:var(--paper);color:var(--ink);border-color:var(--green)}

  /* TABS */
  .tabs{display:flex;border-bottom:1.5px solid var(--border);background:var(--white);padding:0 2rem}
  .tab{padding:14px 18px;font-size:13px;font-weight:600;color:var(--text-muted);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .15s;letter-spacing:.02em}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--green);border-bottom-color:var(--gold)}

  /* MAIN */
  .main{padding:2rem;max-width:920px;margin:0 auto}

  /* DASHBOARD */
  .dash-intro{margin-bottom:1.5rem}
  .dash-intro h2{font-size:20px;font-weight:700;color:var(--green);font-family:'Poppins',sans-serif}
  .dash-intro p{font-size:13px;color:var(--text-muted);margin-top:4px}
  .gold-line{width:36px;height:2.5px;background:var(--gold);border-radius:2px;margin:.6rem 0}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
  .stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow)}
  .stat-card .n{font-size:28px;font-weight:700;line-height:1;font-family:'Poppins',sans-serif}
  .stat-card .l{font-size:12px;color:var(--text-muted);margin-top:5px;font-weight:500}
  .stat-card.c-green .n{color:var(--green)}
  .stat-card.c-gold .n{color:var(--gold)}
  .stat-card.c-ink .n{color:var(--ink)}
  .stat-card .accent-line{width:24px;height:2px;background:var(--gold);border-radius:2px;margin-top:8px}

  .overall-progress{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.4rem 1.6rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .overall-progress h3{font-size:14px;font-weight:600;color:var(--green);margin-bottom:.9rem;display:flex;justify-content:space-between;font-family:'Poppins',sans-serif}
  .overall-progress h3 span{color:var(--gold);font-weight:700}
  .pbar{height:8px;background:var(--paper);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
  .pbar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s ease}

  /* DOELEN */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
  .section-header h2{font-size:16px;font-weight:700;color:var(--green);font-family:'Poppins',sans-serif}
  .btn-add-doel{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.02em}
  .btn-add-doel:hover{background:var(--green-dark)}

  .doel-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:.85rem;box-shadow:var(--shadow);overflow:hidden}
  .doel-header{display:flex;align-items:center;gap:12px;padding:1rem 1.4rem;cursor:pointer;transition:background .1s}
  .doel-header:hover{background:var(--paper)}
  .doel-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .doel-name{font-size:15px;font-weight:600;flex:1;font-family:'Poppins',sans-serif;color:var(--ink)}
  .doel-prog-wrap{display:flex;align-items:center;gap:8px}
  .doel-prog-bar{width:80px;height:5px;background:var(--paper);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
  .doel-prog-fill{height:100%;border-radius:3px;transition:width .4s}
  .doel-prog-pct{font-size:12px;color:var(--text-muted);min-width:32px;text-align:right;font-weight:600;font-family:'Poppins',sans-serif}
  .doel-chevron{color:var(--text-muted);font-size:18px;transition:transform .2s;line-height:1}
  .doel-chevron.open{transform:rotate(180deg)}
  .doel-btns{display:flex;gap:4px;margin-left:8px}
  .doel-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:3px 5px;border-radius:6px;opacity:0;transition:all .15s;line-height:1}
  .doel-header:hover .doel-btn{opacity:1}
  .doel-btn:hover{background:var(--paper);color:var(--ink)}
  .doel-btn.del:hover{color:var(--red)}
  .doel-actions-wrap{border-top:1.5px solid var(--border)}

  /* TAKEN */
  .taak-row{display:flex;align-items:center;gap:10px;padding:.7rem 1.4rem;border-bottom:1px solid var(--border);transition:background .1s}
  .taak-row:last-child{border-bottom:none}
  .taak-row:hover{background:var(--paper)}
  .taak-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--white)}
  .taak-check.checked{background:var(--green);border-color:var(--green)}
  .taak-check.checked::after{content:'\2713';color:white;font-size:11px;font-weight:700}
  .taak-text{flex:1;font-size:14px;color:var(--ink)}
  .taak-text.done{text-decoration:line-through;color:var(--text-muted)}
  .status-pill{font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:'Poppins',sans-serif;letter-spacing:.02em}
  .s-gepland{background:var(--paper);color:var(--green);border:1.5px solid var(--border)}
  .s-bezig{background:#FEF6E0;color:#9A6E10;border:1.5px solid var(--gold-soft)}
  .s-afgerond{background:#EAF3EE;color:var(--green);border:1.5px solid #B5D4C4}
  .taak-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px 4px;opacity:0;transition:opacity .15s;line-height:1}
  .taak-row:hover .taak-del{opacity:1}
  .taak-del:hover{color:var(--red)}

  /* ADD TAAK */
  .add-taak-wrap{padding:.85rem 1.4rem;background:var(--paper);border-top:1.5px solid var(--border)}
  .add-taak-form{display:flex;gap:8px}
  .add-taak-form input{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--white);color:var(--ink);font-family:'Inter',sans-serif}
  .add-taak-form input:focus{outline:none;border-color:var(--green)}
  .add-taak-form select{padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--white);color:var(--ink);font-family:'Inter',sans-serif}
  .add-taak-form select:focus{outline:none;border-color:var(--green)}
  .btn-add-taak{padding:9px 16px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Poppins',sans-serif}
  .btn-add-taak:hover{background:var(--green-dark)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,81,58,0.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
  .modal{background:var(--white);border-radius:20px;padding:2.1rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,81,58,0.18)}
  .modal h3{font-size:17px;font-weight:700;color:var(--green);margin-bottom:.4rem;font-family:'Poppins',sans-serif}
  .modal-gold{width:28px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:1.25rem}
  .modal input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);margin-bottom:1rem;font-family:'Inter',sans-serif}
  .modal input:focus{outline:none;border-color:var(--green)}
  .color-picker{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
  .color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s}
  .color-dot.selected{border-color:var(--ink);transform:scale(1.15)}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end}
  .btn-cancel{padding:9px 18px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;color:var(--ink);font-family:'Poppins',sans-serif;font-weight:500}
  .btn-cancel:hover{background:var(--paper)}
  .btn-save{padding:9px 20px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif}
  .btn-save:hover{background:var(--green-dark)}

  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px}
  .loading{text-align:center;padding:3rem;color:var(--text-muted);font-size:14px}

  @media(max-width:600px){
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .topbar-subtitle{display:none}
    .main{padding:1rem}
    .auth-logo .vv-logo{width:160px}
  }
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img class="vv-logo" src="logo.png" alt="VakVerbind" />
      <div class="auth-divider"></div>
      <p>Projectboard — log in om verder te gaan</p>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label>E-mailadres</label>
      <input type="email" id="email" placeholder="jouw@email.nl" />
    </div>
    <div class="form-group">
      <label>Wachtwoord</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Inloggen</button>
  </div>
</div>

<!-- ==================== APP SCREEN ==================== -->
<div id="app-screen">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img class="vv-logo" src="logo.png" alt="VakVerbind" />
      <div class="topbar-divider"></div>
      <span class="topbar-subtitle">Projectboard</span>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="user-email"></span>
      <button class="btn-logout" onclick="doLogout()">Uitloggen</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('doelen')">Doelen & Taken</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- DASHBOARD TAB -->
    <div id="tab-dashboard">
      <div class="dash-intro">
        <h2>Voortgang opstarttraject</h2>
        <div class="gold-line"></div>
        <p>Overzicht van alle doelen en taken voor de start van VakVerbind.</p>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="overall-progress">
        <h3>Totale voortgang <span id="overall-pct">0%</span></h3>
        <div class="pbar"><div class="pbar-fill" id="overall-bar" style="width:0%"></div></div>
      </div>
      <div id="dashboard-doelen"></div>
    </div>

    <!-- DOELEN TAB -->
    <div id="tab-doelen" style="display:none">
      <div class="section-header">
        <h2>Doelen & Taken</h2>
        <button class="btn-add-doel" onclick="openAddDoel()">+ Doel toevoegen</button>
      </div>
      <div id="doelen-list"><div class="loading">Laden...</div></div>
    </div>
  </div>

</div>

<!-- ==================== MODAL ==================== -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3>Nieuw doel toevoegen</h3>
    <div class="modal-gold"></div>
    <input type="text" id="modal-naam" placeholder="Naam van het doel..." />
    <div class="color-picker" id="color-picker"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalDirect()">Annuleren</button>
      <button class="btn-save" onclick="saveDoel()">Opslaan</button>
    </div>
  </div>
</div>

<!-- ==================== FIREBASE ==================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-L4C73-koH0wONPgMq9lI-Oi88diYfTE",
  authDomain: "roadmap-uitzendbureau.firebaseapp.com",
  projectId: "roadmap-uitzendbureau",
  storageBucket: "roadmap-uitzendbureau.firebasestorage.app",
  messagingSenderId: "336499917608",
  appId: "1:336499917608:web:77c46d154272027430861d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const COLORS = ['#00513A','#C9A227','#1A6B4A','#8B5E0A','#2E5D4B','#A67C52','#4A7C6F','#6B4226'];
let selectedColor = COLORS[0];
let doelen = [];
let unsubDoelen = null;
let starterRun = false;

// Color picker
const cp = document.getElementById('color-picker');
COLORS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
  d.style.background = c;
  d.onclick = () => {
    selectedColor = c;
    document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('selected'));
    d.classList.add('selected');
  };
  cp.appendChild(d);
});

// Auth
window.doLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('auth-error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Inloggen...';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    err.textContent = 'Inloggen mislukt. Controleer je e-mail en wachtwoord.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Inloggen';
  }
};

window.doLogout = () => signOut(auth);

document.getElementById('password').addEventListener('keydown', e => {
  if(e.key === 'Enter') window.doLogin();
});

onAuthStateChanged(auth, user => {
  if(user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    startListening();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Inloggen';
    if(unsubDoelen) { unsubDoelen(); unsubDoelen = null; }
  }
});

// Realtime data
function startListening() {
  const q = query(collection(db, 'doelen'), orderBy('aangemaakt'));
  unsubDoelen = onSnapshot(q, snap => {
    doelen = snap.docs.map(d => ({ id: d.id, ...d.data(), taken: d.data().taken || [] }));
    if(!starterRun && doelen.length === 0) { starterRun = true; vulStartDoelen(); }
    render();
  });
}

function render() { renderStats(); renderDashboardDoelen(); renderDoelenList(); }

function calcStats() {
  let totalTaken=0,gepland=0,bezig=0,afgerond=0;
  doelen.forEach(d=>d.taken.forEach(t=>{totalTaken++;if(t.status==='gepland')gepland++;else if(t.status==='bezig')bezig++;else afgerond++;}));
  return{totalDoelen:doelen.length,totalTaken,gepland,bezig,afgerond};
}

function renderStats() {
  const s=calcStats();
  const pct=s.totalTaken?Math.round(s.afgerond/s.totalTaken*100):0;
  document.getElementById('overall-pct').textContent=pct+'%';
  document.getElementById('overall-bar').style.width=pct+'%';
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card c-green"><div class="n">${s.totalDoelen}</div><div class="l">Doelen</div><div class="accent-line"></div></div>
    <div class="stat-card c-ink"><div class="n">${s.gepland}</div><div class="l">Gepland</div><div class="accent-line"></div></div>
    <div class="stat-card c-gold"><div class="n">${s.bezig}</div><div class="l">Bezig</div><div class="accent-line"></div></div>
    <div class="stat-card c-green"><div class="n">${s.afgerond}</div><div class="l">Afgerond</div><div class="accent-line"></div></div>`;
}

function doelProgress(d){if(!d.taken.length)return 0;return Math.round(d.taken.filter(t=>t.status==='afgerond').length/d.taken.length*100);}

function renderDashboardDoelen(){
  const el=document.getElementById('dashboard-doelen');
  if(!doelen.length){el.innerHTML='<div class="empty-state">Nog geen doelen. Ga naar "Doelen & Taken" om te starten.</div>';return;}
  el.innerHTML=doelen.map(d=>{const pct=doelProgress(d);return`<div class="doel-card" style="margin-bottom:.6rem"><div class="doel-header" style="cursor:default"><span class="doel-color" style="background:${d.kleur}"></span><span class="doel-name">${d.naam}</span><div class="doel-prog-wrap"><div class="doel-prog-bar"><div class="doel-prog-fill" style="width:${pct}%;background:${d.kleur}"></div></div><span class="doel-prog-pct">${pct}%</span></div></div></div>`;}).join('');
}

function renderDoelenList(){
  const el=document.getElementById('doelen-list');
  if(!doelen.length){el.innerHTML='<div class="empty-state">Nog geen doelen. Klik op "+ Doel toevoegen" om te starten.</div>';return;}
  el.innerHTML=doelen.map(d=>{
    const pct=doelProgress(d);const open=d._open!==false;
    return`<div class="doel-card"><div class="doel-header" onclick="toggleDoel('${d.id}')"><span class="doel-color" style="background:${d.kleur}"></span><span class="doel-name">${d.naam}</span><div class="doel-prog-wrap"><div class="doel-prog-bar"><div class="doel-prog-fill" style="width:${pct}%;background:${d.kleur}"></div></div><span class="doel-prog-pct">${pct}%</span><div class="doel-btns"><button class="doel-btn" onclick="event.stopPropagation();renameDoel('${d.id}')" title="Hernoemen">&#9998;</button><button class="doel-btn del" onclick="event.stopPropagation();delDoel('${d.id}')" title="Verwijderen">&times;</button></div><span class="doel-chevron ${open?'open':''}">&#8964;</span></div></div>${open?`<div class="doel-actions-wrap">${d.taken.map((t,i)=>`<div class="taak-row"><div class="taak-check ${t.status==='afgerond'?'checked':''}" onclick="toggleCheck('${d.id}',${i})"></div><span class="taak-text ${t.status==='afgerond'?'done':''}">${t.tekst}</span><button class="status-pill s-${t.status}" onclick="cycleStatus('${d.id}',${i})">${t.status}</button><button class="taak-del" onclick="delTaak('${d.id}',${i})">&times;</button></div>`).join('')}<div class="add-taak-wrap"><div class="add-taak-form"><input type="text" id="taak-input-${d.id}" placeholder="Nieuwe taak omschrijven..." onkeydown="if(event.key==='Enter')addTaak('${d.id}')"/><select id="taak-status-${d.id}"><option value="gepland">gepland</option><option value="bezig">bezig</option><option value="afgerond">afgerond</option></select><button class="btn-add-taak" onclick="addTaak('${d.id}')">+ Taak</button></div></div></div>`:''}</div>`;
  }).join('');
}

// Actions
window.toggleDoel=(id)=>{const d=doelen.find(x=>x.id===id);if(d){d._open=d._open===false?true:false;renderDoelenList();}};

window.delDoel=async(id)=>{if(!confirm('Weet je zeker dat je dit doel en alle taken wilt verwijderen?'))return;await deleteDoc(doc(db,'doelen',id));};

window.renameDoel=async(id)=>{const d=doelen.find(x=>x.id===id);if(!d)return;const naam=prompt('Nieuwe naam voor dit doel:',d.naam);if(!naam||!naam.trim())return;await updateDoc(doc(db,'doelen',id),{naam:naam.trim()});};

window.addTaak=async(doelId)=>{const inp=document.getElementById('taak-input-'+doelId);const sel=document.getElementById('taak-status-'+doelId);if(!inp||!inp.value.trim())return;const d=doelen.find(x=>x.id===doelId);if(!d)return;const taken=[...d.taken,{tekst:inp.value.trim(),status:sel.value}];await updateDoc(doc(db,'doelen',doelId),{taken});inp.value='';};

window.toggleCheck=async(doelId,idx)=>{const d=doelen.find(x=>x.id===doelId);if(!d)return;const taken=[...d.taken];taken[idx]={...taken[idx],status:taken[idx].status==='afgerond'?'gepland':'afgerond'};await updateDoc(doc(db,'doelen',doelId),{taken});};

window.cycleStatus=async(doelId,idx)=>{const d=doelen.find(x=>x.id===doelId);if(!d)return;const v=['gepland','bezig','afgerond'];const taken=[...d.taken];const h=v.indexOf(taken[idx].status);taken[idx]={...taken[idx],status:v[(h+1)%3]};await updateDoc(doc(db,'doelen',doelId),{taken});};

window.delTaak=async(doelId,idx)=>{const d=doelen.find(x=>x.id===doelId);if(!d)return;const taken=d.taken.filter((_,i)=>i!==idx);await updateDoc(doc(db,'doelen',doelId),{taken});};

// Modal
window.openAddDoel=()=>{document.getElementById('modal-naam').value='';document.getElementById('modal').style.display='flex';setTimeout(()=>document.getElementById('modal-naam').focus(),50);};
window.closeModal=(e)=>{if(e.target.id==='modal')closeModalDirect();};
window.closeModalDirect=()=>{document.getElementById('modal').style.display='none';};
window.saveDoel=async()=>{const naam=document.getElementById('modal-naam').value.trim();if(!naam)return;await addDoc(collection(db,'doelen'),{naam,kleur:selectedColor,taken:[],aangemaakt:serverTimestamp()});closeModalDirect();};
document.getElementById('modal-naam').addEventListener('keydown',e=>{if(e.key==='Enter')window.saveDoel();});

// Tabs
window.showTab=(tab)=>{document.getElementById('tab-dashboard').style.display=tab==='dashboard'?'block':'none';document.getElementById('tab-doelen').style.display=tab==='doelen'?'block':'none';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='dashboard')||(i===1&&tab==='doelen')));};

// Start doelen
async function vulStartDoelen(){
  const s=[
    {naam:'Juridische structuur & inschrijving',kleur:'#00513A'},
    {naam:'Vergunningen & certificering',kleur:'#1A6B4A'},
    {naam:'Financiën & verzekeringen',kleur:'#C9A227'},
    {naam:'Administratie & software',kleur:'#8B5E0A'},
    {naam:'Commercie & markt',kleur:'#2E5D4B'},
    {naam:'Personeel & werkgeversverplichtingen',kleur:'#6B4226'},
  ];
  for(const d of s){await addDoc(collection(db,'doelen'),{...d,taken:[],aangemaakt:serverTimestamp()});}
}
</script>
</body>
